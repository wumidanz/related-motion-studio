<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RMS Frames — Related Motion Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #070605;
    -webkit-font-smoothing: antialiased;
  }

  /* WebGL canvas fills the viewport */
  #c {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Text sits above canvas */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  h1 {
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    font-weight: 600;
    font-size: clamp(28px, 6.5vw, 108px);
    letter-spacing: 0.28em;
    text-indent: 0.28em; /* optical shift for tracking */
    text-transform: uppercase;
    color: #ffffff;
    white-space: nowrap;
    /* Subtle shadow so it reads over any image */
    text-shadow: 0 2px 40px rgba(0,0,0,0.45);
    opacity: 0;
    animation: appear 1.4s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
  }

  @keyframes appear {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Fallback for no-WebGL browsers */
  .no-webgl {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 80% at 60% 40%, #1a1410 0%, #070605 70%);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="stage">
  <h1>Coming Soon</h1>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   CONFIGURATION
   ─────────────────────────────────────────────────────────────────────
   Drop your background images in:  products/rms-frames/assets/
   Add as many paths as you like. Images cycle automatically.
═══════════════════════════════════════════════════════════════════════ */
const IMAGES = [
  'assets/bg1.webp',
  'assets/bg2.webp',
  'assets/bg3.webp',
];

const SLIDE_MS = 6000;   /* how long each image stays visible   */
const FADE_MS  = 1800;   /* crossfade duration between images   */

/* ═══════════════════════════════════════════════════════════════════════
   WEBGL SETUP
═══════════════════════════════════════════════════════════════════════ */

const canvas = document.getElementById('c');
const gl     = canvas.getContext('webgl', { alpha: false, antialias: false })
            || canvas.getContext('experimental-webgl', { alpha: false });

if (!gl) {
  /* No WebGL — show dark gradient fallback */
  const fb = document.createElement('div');
  fb.className = 'no-webgl';
  document.body.prepend(fb);
} else {
  boot();
}

function boot() {

  /* ── Vertex shader: fullscreen triangle strip ─────────────────────── */
  const VS = `
    attribute vec2 a_pos;
    varying   vec2 v_uv;
    void main() {
      v_uv        = a_pos * 0.5 + 0.5;
      v_uv.y      = 1.0 - v_uv.y;        /* flip Y so images render upright */
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;

  /* ── Fragment shader: reed-glass ripple + crossfade ──────────────── */
  const FS = `
    precision highp float;

    uniform sampler2D u_texA;   /* current image  */
    uniform sampler2D u_texB;   /* next image     */
    uniform float     u_alpha;  /* crossfade 0→1  */
    uniform float     u_time;   /* elapsed seconds */

    varying vec2 v_uv;

    void main() {
      /* ── Reed-glass distortion parameters ──
         Tune here to change the look of the ripple. */
      float freq   = 36.0;   /* stripe density  — higher = more columns  */
      float amp    = 0.028;  /* warp strength   — higher = more distorted */
      float speed  = 0.28;   /* wave speed      — lower = slower, dreamier */

      /* Primary wave + a second harmonic for organic, non-mechanical feel */
      float wave =
          sin(v_uv.x * freq           + u_time * speed)        * amp
        + sin(v_uv.x * freq * 1.82    + u_time * speed * 0.6)  * amp * 0.28;

      vec2 uv = vec2(v_uv.x + wave, v_uv.y);

      /* ── Lens-edge darkening (the dark lines between glass ridges) ──
         Darkens where the sine wave crosses zero — matching the look
         of light bending at the edge of each lenticular column. */
      float lens  = abs(sin(v_uv.x * freq + u_time * speed));
      float edge  = lens * 0.22 + 0.78;   /* max 22% darkening at edges */

      /* ── Sample both images through the same warp ── */
      vec4 colA = texture2D(u_texA, uv);
      vec4 colB = texture2D(u_texB, uv);

      vec4 col = mix(colA, colB, u_alpha);
      col.rgb  *= edge;

      gl_FragColor = col;
    }
  `;

  /* ── Compile helpers ─────────────────────────────────────────────── */
  function makeShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, makeShader(gl.VERTEX_SHADER,   VS));
  gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  /* ── Fullscreen quad (-1 to 1 in X and Y) ───────────────────────── */
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER,
    new Float32Array([-1,-1,  1,-1,  -1,1,  1,1]), gl.STATIC_DRAW);

  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  /* ── Uniform locations ───────────────────────────────────────────── */
  const uTexA  = gl.getUniformLocation(prog, 'u_texA');
  const uTexB  = gl.getUniformLocation(prog, 'u_texB');
  const uAlpha = gl.getUniformLocation(prog, 'u_alpha');
  const uTime  = gl.getUniformLocation(prog, 'u_time');

  /* ── Texture helpers ─────────────────────────────────────────────── */
  function makeTex() {
    const t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    /* Start with the brand dark color so there's no white flash */
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA,
      gl.UNSIGNED_BYTE, new Uint8Array([7, 6, 5, 255]));
    return t;
  }

  function upload(tex, imgEl) {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, imgEl);
  }

  const textures = [makeTex(), makeTex()];

  /* ── Image loading ───────────────────────────────────────────────── */
  const pool = []; /* successfully-loaded Image elements */

  function loadImg(src) {
    return new Promise(resolve => {
      const img    = new Image();
      img.onload   = () => resolve(img);
      img.onerror  = () => resolve(null); /* skip missing files silently */
      img.src      = src;
    });
  }

  /* ── Slide state ─────────────────────────────────────────────────── */
  let slot   = 0;           /* which textures[] index is "current"   */
  let imgIdx = 0;           /* which pool[] element is showing       */
  let alpha  = 0;           /* crossfade progress 0→1               */
  let phase  = 'showing';   /* 'showing' | 'fading'                  */
  let phaseT = 0;           /* performance.now() when phase started  */

  /* ── Resize ──────────────────────────────────────────────────────── */
  function resize() {
    canvas.width  = (window.innerWidth  * devicePixelRatio) | 0;
    canvas.height = (window.innerHeight * devicePixelRatio) | 0;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  /* ── Render loop ─────────────────────────────────────────────────── */
  function draw(now) {
    const t  = now * 0.001;
    const dt = now - phaseT;

    /* ── Slideshow timing (only when we have multiple images) ── */
    if (pool.length > 1) {

      if (phase === 'showing' && dt > SLIDE_MS) {
        /* Upload the NEXT image into the inactive texture slot */
        const nextIdx = (imgIdx + 1) % pool.length;
        upload(textures[1 - slot], pool[nextIdx]);
        phase  = 'fading';
        phaseT = now;
      }

      if (phase === 'fading') {
        alpha = Math.min(dt / FADE_MS, 1.0);
        if (alpha >= 1.0) {
          imgIdx = (imgIdx + 1) % pool.length;
          slot   = 1 - slot;
          alpha  = 0.0;
          phase  = 'showing';
          phaseT = now;
        }
      }
    }

    /* ── Set shader uniforms ── */
    gl.uniform1i(uTexA,  0);
    gl.uniform1i(uTexB,  1);
    gl.uniform1f(uAlpha, alpha);
    gl.uniform1f(uTime,  t);

    /* ── Bind textures to the two units ── */
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, textures[slot]);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, textures[1 - slot]);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(draw);
  }

  /* ── Bootstrap: load images then start ───────────────────────────── */
  Promise.all(IMAGES.map(loadImg)).then(results => {
    results.forEach(img => { if (img) pool.push(img); });

    if (pool.length > 0) {
      upload(textures[0], pool[0]);
    }
    if (pool.length > 1) {
      upload(textures[1], pool[1]); /* pre-load next so first fade is instant */
    }

    phaseT = performance.now();
    requestAnimationFrame(draw);
  });
}
</script>
</body>
</html>
